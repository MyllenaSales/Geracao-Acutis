<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/paginaPadrao.css">
    <link rel="stylesheet" href="/css/formulario.css">
</head>

<body>
    <header class="cabecalho">
        <div class="title">
            <h2>Geração Acutis <img src="/img/icons/vaticanoFlag.png" alt=""></h2>
        </div>
        <nav class="navegacao">
            <a href="/index.html">Home</a>
        </nav>
    </header>
    <main>
        <div class="formularioContainer">
            <form id="formCadastro" class="formBloco">
                <h3>Criar Conta</h3>

                <div class="grupoCampo">
                    <label for="cadNome">Nome Completo</label>
                    <input type="text" id="cadNome" name="nome" placeholder="Digite seu nome" required>
                </div>

                <div class="grupoCampo">
                    <label for="cadEmail">E-mail</label>
                    <input type="email" id="cadEmail" name="email" placeholder="exemplo@email.com" required>
                </div>

                <div class="grupoCampo">
                    <label for="cadTelefone">Telefone</label>
                    <input type="tel" id="cadTelefone" name="telefone" placeholder="(00) 00000-0000" required>
                </div>

                <div class="grupoCampo">
                    <label for="cadDataNascimento">Data de Nascimento</label>
                    <input type="date" id="cadDataNascimento" name="dataNascimento" required>
                </div>

                <div class="grupoCampo">
                    <label for="cadCep">CEP</label>
                    <input type="text" id="cadCep" name="cep" placeholder="00000-000" required>
                </div>

                <div class="grupoCampo">
                    <label for="cadRua">Rua</label>
                    <input type="text" id="cadRua" name="rua" placeholder="Nome da rua" required>
                </div>

                <div class="grupoCampo">
                    <label for="cadNumero">Número</label>
                    <input type="text" id="cadNumero" name="numero" placeholder="Número" required>
                </div>

                <div class="grupoCampo">
                    <label for="cadComplemento">Complemento</label>
                    <input type="text" id="cadComplemento" name="complemento"
                        placeholder="Ex: apartamento, casa">
                </div>

                <div class="grupoCampo">
                    <label for="cadBairro">Bairro</label>
                    <input type="text" id="cadBairro" name="bairro" placeholder="Bairro" required>
                </div>

                <div class="grupoCampo">
                    <label for="cadCidade">Cidade</label>
                    <input type="text" id="cadCidade" name="cidade" placeholder="Cidade" required>
                </div>

                <div class="grupoCampo">
                    <label for="cadEstado">Estado</label>
                    <input type="text" id="cadEstado" name="estado" placeholder="UF" maxlength="2" required>
                </div>

                <div class="grupoCampo">
                    <label for="cadSenha">Senha</label>
                    <input type="password" autocomplete="new-password" id="cadSenha" name="senha" placeholder="Crie uma senha" required>
                </div>

                <div class="grupoCampo">
                    <label for="cadConfirmarSenha">Confirmar senha</label>
                    <input type="password" id="cadConfirmarSenha" name="confirmarSenha"
                        placeholder="Digite a senha novamente" required>
                </div>

                <div class="grupoCampo">
                    <label for="cadMovimento">Participa de algum grupo/movimento católico?</label>
                    <textarea id="cadMovimento" name="movimentoCatolico" rows="3"
                        placeholder="Se sim, qual? Se não, pode deixar em branco."></textarea>
                </div>

                <div class="grupoCampo">
                    <input type="checkbox" id="aceiteTermos" required>
                    <label for="aceiteTermos">Li e concordo com os Termos de Uso e Política de Privacidade.</label>
                </div>

                <div class="grupoCampo">
                    <label>Já possui cadastro? <a href="/pages/formularios/login.html">Faça login</a></label>
                </div>

                <button type="submit" class="btnEnviar">Cadastrar</button>
            </form>
        </div>
    </main>
    <footer class="rodape">
        <div class="rodapeConteudo">
            <p>Site desenvolvido na disciplina de Tecnologias Web</p>
            <p>&copy; Curso de Ciência da Computação</p>
        </div>
    </footer>
</body>
</html>
